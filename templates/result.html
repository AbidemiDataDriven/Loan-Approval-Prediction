<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f4f7fc, #e9efff);
            font-family: "Segoe UI", sans-serif;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4 text-center">

                <h2 class="mb-3">Loan Prediction Result</h2>

                {% if result == "Approved" %}
                    <h3 class="text-success">✅ Loan Approved</h3>
                {% else %}
                    <h3 class="text-danger">❌ Loan Rejected</h3>
                {% endif %}

                {% if probability %}
                    <p class="mt-3">
                        Approval Confidence:
                        <strong>{{ probability }}%</strong>
                    </p>
                {% endif %}

                <a href="/" class="btn btn-outline-secondary mt-4">
                    Make Another Prediction
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
